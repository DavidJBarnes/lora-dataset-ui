# project.conf — Central configuration for all scripts
# Edit this file once, then run any script without arguments.
#
# Usage:
#   1. Clone the project
#   2. Edit this file (trigger, model paths, reference face)
#   3. Run scripts — they all read from here

# ============================================================
# Character
# ============================================================
TRIGGER="k3lly-young"
CLASS="woman"

# Your best front-facing close-up for FaceSwapLab consistency
REFERENCE_FACE="reference_face.png"

# FaceSwapLab face checkpoint (takes precedence over REFERENCE_FACE if set)
# Build checkpoints in A1111's FaceSwapLab tab > Build tool
# Set to "None" to use REFERENCE_FACE instead
FACE_CHECKPOINT="Kelly_young.safetensors"

# These are injected into every prompt as <lora:name:weight> tags
# Stacks with --lora CLI flag — both conf and CLI LoRAs apply together
# Set to "None" to disable
# Example: "klb_y1_pony_v1:0.7,detail_enhancer:0.4"
LORAS="None"

# Character description for prompt generation (used by generate_dataset.py)
# Wildcards resolve server-side in A1111
CHARACTER_DESC="dirty blonde __cyberRealisticPony/hair__, green eyes, fair skin, straight nose, natural pink lips, natural sagging breasts, large areola, mid 20s, innie"

# Extra negative prompt terms appended to model defaults during generation
# Set to "None" to use only the model's default negative
# Example: "text, logo, border, frame, cropped"
NEGATIVE_EXTRA="fat,overweight,ugly,chubby"

# ============================================================
# Dataset
# ============================================================
DATASET_DIR="dataset/img"
NUM_REPEATS=10

# ============================================================
# Model Paths — verify these exist on your training machine
# Find with: find ~ -name "*.safetensors" | grep -i "pony\|lustify"
# ============================================================
PONY_MODEL_PATH="$HOME/StabilityMatrix-linux-x64/Data/Models/cyberrealisticPony_v11.safetensors"
LUSTIFY_MODEL_PATH="$HOME/StabilityMatrix-linux-x64/Data/Models/Lustify-SDXL.safetensors"

# ============================================================
# Training
# ============================================================
VERSION="v1"
SD_SCRIPTS="$HOME/projects/sd-scripts"
# PROJECT_DIR auto-detected from script/config location

# A1111 API URL (for generate_dataset.py)
A1111_URL="http://2070.zero:7860"
